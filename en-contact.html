<body class="page-body" data-include-page="contact">

<div data-include="/partials/header-en.html"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="section-split">
        <div class="section-split__content">
          <div>
            <span class="section__label">CONTACT</span>
            <h1 class="section__title section__title--left">Get a Free Quote</h1>
            <p class="section__lead" style="font-size:1rem">Our technical team replies within 15 minutes (7AM–8PM daily).</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px">
            <a href="tel:+84981422756" style="display:flex;align-items:center;gap:12px;color:var(--color-navy-900);font-weight:600">📞 0981 422 756</a>
            <a href="https://zalo.me/0981422756" style="display:flex;align-items:center;gap:12px;color:var(--color-navy-900);font-weight:600">💬 Chat on Zalo</a>
            <a href="mailto:Dowinvietnam@gmail.com" style="display:flex;align-items:center;gap:12px;color:var(--color-navy-900);font-weight:600">✉ Dowinvietnam@gmail.com</a>
            <p style="color:var(--color-gray-600)">📍 Mao Dien Ward, Bac Ninh Province, Vietnam</p>
            <p style="color:var(--color-gray-600)">💬 WeChat: Dowinvietnam</p>
          </div>
        </div>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/mzdoyrnw" method="POST">
          <input type="text" name="_gotcha" class="honeypot" tabindex="-1" aria-hidden="true">
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label" for="name">Full name <span aria-hidden="true" style="color:var(--color-error)">*</span></label>
              <input class="form-input" type="text" id="name" name="name" required placeholder="John Smith" autocomplete="name">
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Phone number <span aria-hidden="true" style="color:var(--color-error)">*</span></label>
              <input class="form-input" type="tel" id="phone" name="phone" required placeholder="+84 912 345 678" autocomplete="tel">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="name@company.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="company">Company</label>
            <input class="form-input" type="text" id="company" name="company" placeholder="Your company name" autocomplete="organization">
          </div>
          <div class="form-group">
            <label class="form-label" for="product">Product of interest</label>
            <select class="form-input" id="product" name="product">
              <option value="">-- Select product --</option>
              <option>Sand Molding Machine DW-1000</option>
              <option>Sand Molding Machine DW-1200</option>
              <option>Sand Molding Machine DW-1600</option>
              <option>Sand Mixer</option>
              <option>Automated Casting Line</option>
              <option>Other / General inquiry</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-input" id="message" name="message" rows="4" placeholder="Describe your production requirements, mold size, output needed..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Send Inquiry</button>
        </form>
      </div>
    </div>
  </section>
</main>
